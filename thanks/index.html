<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Application Submitted</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 20px;
        text-align: center;
      }

      .box {
        max-width: 600px;
        background: #f8fbff;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.08);
        animation: fadeIn 1.2s ease-in-out forwards;
        opacity: 0;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      h1 {
        font-size: 30px;
        color: #0045ff;
        margin-bottom: 18px;
        font-weight: 700;
      }

      ul {
        font-size: 18px;
        color: #2f2f2f;
        line-height: 30px;
        margin-top: 10px;
        text-align: left;
        list-style: none;
      }

      ul li::before {
        content: "✓ ";
        font-weight: bold;
        color: #0a8837;
      }

      .small {
        margin-top: 18px;
        font-size: 14px;
        color: #444;
      }

      .loader {
        margin: 25px auto 0;
        border: 5px solid #eee;
        border-top: 5px solid #0045ff;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>

  <body>
    <div class="box">
      <h1>Thank You!</h1>

      <p>Your application has been securely stored.</p>

      <ul>
        <li>A loan specialist will review your details.</li>
        <li>Expected response time: within 15–30 minutes.</li>
        <li>Phone & email verification may be required.</li>
      </ul>

      <p class="small">Redirecting you shortly...</p>

      <div class="loader"></div>
    </div>

    <script>
      // Redirect user back to home after 6 seconds
      setTimeout(() => {
        window.location.href = "../index.html"; // <-- Change if your home path is different
      }, 6000);
    </script>
  </body>
</html>
